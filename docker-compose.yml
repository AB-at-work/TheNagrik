# Local development PostgreSQL for The Nagrik.
# Usage: docker compose up -d   (then DATABASE_URL points at localhost:5432)
services:
  postgres:
    image: postgres:16-alpine
    container_name: thenagrik-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: nagrik
      POSTGRES_PASSWORD: nagrik
      POSTGRES_DB: thenagrik_dev
    ports:
      - '5433:5432'
    volumes:
      - thenagrik_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U nagrik -d thenagrik_dev']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  thenagrik_pgdata:
